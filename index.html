<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Calixte</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    background: #0d0d0d;
    transition: background 0.5s;
    font-family: Arial, sans-serif;
  }

  .title {
    font-size: 90px;
    font-weight: bold;
    background: linear-gradient(90deg, #00eaff, #0066ff, #8a2be2);
    background-size: 300%;
    -webkit-background-clip: text;
    color: transparent;
    animation: gradientMove 4s infinite linear;
    margin-bottom: 50px;
  }

  @keyframes gradientMove {
    0% { background-position: 0%; }
    100% { background-position: 300%; }
  }

  .neon-btn {
    padding: 18px 40px;
    font-size: 24px;
    color: #00eaff;
    border: 3px solid #00eaff;
    border-radius: 12px;
    background: transparent;
    cursor: pointer;
    text-shadow: 0 0 10px #00eaff;
    box-shadow: 0 0 15px #00eaff, inset 0 0 15px #00eaff;
    transition: 0.3s;
  }

  .neon-btn:hover {
    color: #fff;
    box-shadow: 0 0 25px #00eaff, inset 0 0 25px #00eaff;
  }
</style>
</head>

<body>

<h1 class="title">CALIXTE</h1>

<button class="neon-btn" onclick="changeColor()">Changer la couleur</button>

<script>
  function changeColor() {
    const colors = ["#0d0d0d", "#1a0033", "#002233", "#330000", "#001a00", "#331a00"];
    document.body.style.background = colors[Math.floor(Math.random() * colors.length)];
  }
</script>

</body>
</html>
